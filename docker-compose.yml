version: "3.9"

# Muneem Ji dev services — database and object storage are hosted (Neon + AWS S3).
# Only the Python pdfplumber sandbox runs locally.

services:
  python-sandbox:
    build:
      context: ./docker/python-sandbox
      dockerfile: Dockerfile
    container_name: muneem-python-sandbox
    ports:
      - "8000:8000"
    restart: unless-stopped
    # No network access for the sandbox — pdfplumber scripts must not reach external services
    network_mode: none
